
# Phase 2 — Local Alignment (cross-attention + MLM)
# Warm-started from Phase 1 best checkpoint (ckpt_epoch16.pt)
#
# Usage:
#   python scripts/train.py --config configs/local_align.yaml \
#       --init-from outputs/baseline_run1/ckpt_epoch16.pt \
#       --checkpoint-dir outputs/local_align_run1 \
#       --no-eval > runs/train_local_align_run1.log 2>&1

model:
  backbone: openai/clip-vit-base-patch16
  embed_dim: 512
  proj_hidden_dim: 512
  proj_out_dim: 512
  init_temperature: 0.07
  min_temperature: 0.04  # floor to prevent collapse
  local_align:
    enabled: true
    n_layers: 2          # cross-attention depth (text→image)
    n_heads: 8
    dropout: 0.1

data:
  root: data
  image_size: 224
  text_image:
    cuhk_pedes:
      enabled: true
      parquet_dir: data/text/CUHK-PEDES/data
    icfg_pedes:
      enabled: true
      csv: data/text/ICFG-PEDES/captions_cleaned.csv
      json: data/text/ICFG-PEDES/ICFG-PEDES.json
      img_root: data/text/ICFG-PEDES/imgs
    rstp_reid:
      enabled: true
      json: data/text/RSTPReid/data_captions.json
      img_root: data/text/RSTPReid/imgs
    iiitd_20k:
      enabled: true
      json: data/text/IIITD-20K/Filtered.json
      img_root: data/text/IIITD-20K/IIITD-20K
    orbench:
      enabled: true
      json: data/image/ORBench/train_annos.json
      img_root: data/image/ORBench
  image_only:
    duke:
      enabled: true
      train_dir: data/image/DukeMTMC-reID/bounding_box_train
      query_dir: data/image/DukeMTMC-reID/query
      gallery_dir: data/image/DukeMTMC-reID/bounding_box_test
    market:
      enabled: true
      train_dir: data/image/Market-1203/Market1203
    last:
      enabled: true
      train_dir: data/image/last/train
      val_dir: data/image/last/val
    caviar:
      enabled: true
      img_dir: data/image/CAVIARa
    grid:
      enabled: true
      mat_file: data/image/underground_reid/features_and_partitions.mat
      probe_dir: data/image/underground_reid/probe
      gallery_dir: data/image/underground_reid/gallery

training:
  batch_size: 64
  gradient_accumulation_steps: 1
  max_epochs: 10           # Phase 2 fine-tunes for 10 additional epochs

  amp_dtype: bf16

  # Phase 2: slightly lower LR (warm starting from Phase 1)
  lr_backbone: 5.0e-6
  lr_heads: 5.0e-5
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine

  loss_weights:
    infonce: 1.0
    id: 1.0

  # MLM (local alignment)
  mlm_mask_prob: 0.15      # fraction of text tokens to predict
  lambda_mlm: 1.0          # MLM loss weight

  lambda_img: 0.0          # Phase 3 disabled
  triplet_margin: 0.3

  warmup_epochs: 1         # 1-epoch LR warmup (shorter since warm-started)

  log_dir: runs/local_align
  log_interval: 10
  eval_interval: 1

  seed: 42
  num_workers: 8
  pin_memory: true

evaluation:
  primary: rstp_reid
  secondary_text_image:
    - orbench           # large-scale text→image benchmark (18,050 pairs)
  eval_image_reid: false
  faiss_use_gpu: true
  k_values: [1, 5, 10]
